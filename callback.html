<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>身份验证跳转中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .title {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 14px;
            color: #666;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="title">验证处理中</div>
        <div class="desc">正在跳转，请稍候...</div>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        // ========== 配置区域 ==========
        // 你的业务主站地址（HTTP或HTTPS均可）
        // 注意：不要以斜杠结尾
        const BUSINESS_BASE_URL = 'http://jdb56b96.natappfree.cc';
        // =============================

        (function() {
            // 1. 从当前 URL 中提取所有参数
            const urlParams = new URLSearchParams(window.location.search);
            
            // 2. 提取关键参数（腾讯云回调会带的参数）[citation:9]
            const code = urlParams.get('code');
            const bizToken = urlParams.get('bizToken');
            const orderNo = urlParams.get('orderNo');
            const faceId = urlParams.get('faceId');
            const liveRate = urlParams.get('liveRate');
            const newSignature = urlParams.get('newSignature');
            
            // 3. 调试日志（可在浏览器控制台查看）
            console.log('中转页面收到回调参数:', {
                code: code,
                bizToken: bizToken,
                orderNo: orderNo,
                faceId: faceId,
                liveRate: liveRate
            });
            
            // 4. 检查是否有 code 参数（核心参数）
            if (code !== null && code !== '') {
                // 构建重定向 URL
                let redirectUrl = BUSINESS_BASE_URL + '/face/callback?code=' + encodeURIComponent(code);
                
                // 附加其他参数（如果有）
                if (bizToken) redirectUrl += '&bizToken=' + encodeURIComponent(bizToken);
                if (orderNo) redirectUrl += '&orderNo=' + encodeURIComponent(orderNo);
                if (faceId) redirectUrl += '&faceId=' + encodeURIComponent(faceId);
                if (liveRate) redirectUrl += '&liveRate=' + encodeURIComponent(liveRate);
                if (newSignature) redirectUrl += '&newSignature=' + encodeURIComponent(newSignature);
                
                console.log('即将跳转到:', redirectUrl);
                
                // 延迟 500ms 跳转，让用户看到提示（可选）
                setTimeout(function() {
                    window.location.href = redirectUrl;
                }, 500);
            } else {
                // 没有 code 参数的情况
                console.warn('未收到 code 参数，完整URL:', window.location.href);
                
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = '未收到认证结果，请返回重试';
                errorMsg.classList.add('show');
                
                document.querySelector('.title').textContent = '验证异常';
                document.querySelector('.desc').textContent = '未收到认证结果';
                
                // 3秒后跳转回首页
                setTimeout(function() {
                    window.location.href = BUSINESS_BASE_URL + '/face/index';
                }, 3000);
            }
        })();
    </script>
</body>
</html>
